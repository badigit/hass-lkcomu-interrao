[tool.ruff]
line-length = 88
target-version = "py312"
# Исключаем файлы из проверки
exclude = ["make_readme.py", "resolve_*.py"]

[tool.ruff.lint]
# Включаем базовые правила:
# E/W - ошибки и предупреждения pycodestyle
# F - ошибки логики (Undefined names, unused imports)
# I - сортировка импортов
# B - поиск частых багов
select = ["E", "F", "W", "I", "B"]
# Игнорируем:
# E501 - длинные строки (в логах и переводах они неизбежны)
# B905 - strict=True в zip() (не нужно в нашем проекте)
ignore = ["E501", "B905"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
